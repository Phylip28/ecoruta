services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ${DB_NAME:-ecoruta}
      POSTGRES_USER: ${DB_USER:-ecoruta}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cambia_esto}
    ports:
      - "5433:5433"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecoruta}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend:/app

volumes:
  pgdata:
